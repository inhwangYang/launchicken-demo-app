# Launchicken managed screenshot plan (v2).
# Launchicken rewrites this file from the screen list configured in the dashboard.
# Remove the "Launchicken managed screenshot plan" header line to manage this file manually.

ios:
  scheme: YourAppScheme
  devices:
    - iPhone 15 Pro Max
    - iPhone 15
  languages:
    - en-US
  screens:
    - name: home
      launch_arguments:
        - --launchicken-screen=home
    - name: settings
      launch_arguments:
        - --launchicken-screen=settings

android:
  package: com.example.app
  devices:
    - Pixel_8
  screens:
    - name: home
      intent_extra:
        launchicken_screen: home
    - name: settings
      intent_extra:
        launchicken_screen: settings
